    <main class="container"> 
     
    <h2>¿Tienes alguna consulta? Escríbenos y te responderemos pronto.</h2> 
        
        
        <form action="#" method="POST" style="max-width: 600px; margin-top: 20px;">
            <label for="nombre">Nombre completo:</label><br>
            <input type="text" id="nombre" name="nombre" placeholder="Escribe tu nombre completo" required style="width: 100%; padding: 10px; margin: 8px 0;"><br><br>
            
            <label for="email">Correo electrónico:</label><br>
            <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required style="width: 100%; padding: 10px; margin: 8px 0;"><br><br>
            
            <label for="mensaje">Mensaje:</label><br>
            <textarea id="mensaje" name="mensaje" rows="6" placeholder="Escribe tu mensaje aquí..." required style="width: 100%; padding: 10px; margin: 8px 0;"></textarea><br><br>
            
            <button type="submit" style="background-color: #1a1a1a; color: white; padding: 12px 30px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer;">
                Enviar
            </button>
        </form>
